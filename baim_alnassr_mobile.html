<title>BAIM HBD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;}
.wrap{background:#0d0a00;min-height:100vh;position:relative;font-family:'Barlow',sans-serif;}
.bg-pattern{position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 28px,rgba(212,160,23,0.025) 28px,rgba(212,160,23,0.025) 30px);pointer-events:none;z-index:0;}
.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:28px 14px 52px;width:100%;}

.club-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.club-crest{width:44px;height:44px;flex-shrink:0;}
.club-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;color:#D4A017;text-transform:uppercase;}
.club-league{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;}

.card-outer{width:100%;max-width:420px;border:1px solid rgba(212,160,23,0.35);background:#111007;position:relative;overflow:hidden;}
.card-top-stripe{height:3px;background:#D4A017;width:100%;}

.player-section{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,0.07);position:relative;overflow:hidden;min-height:130px;}
.player-avatar{width:96px;flex-shrink:0;position:relative;}
.avatar-shadow{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,rgba(212,160,23,0.06));}
.jersey-bg{position:absolute;right:-8px;top:-10px;font-family:'Black Han Sans',sans-serif;font-size:110px;color:rgba(212,160,23,0.04);line-height:1;user-select:none;pointer-events:none;}
.player-info{flex:1;padding:16px 8px 14px;}
.player-number{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#D4A017;letter-spacing:2px;margin-bottom:3px;}
.player-name-first{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.45);text-transform:uppercase;line-height:1;}
.player-name-last{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.5px;line-height:1;}
.player-name-nick{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#D4A017;letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.player-meta{display:flex;gap:12px;margin-top:8px;}
.meta-label{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.meta-value{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.overall-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 14px;gap:1px;border-left:1px solid rgba(255,255,255,0.07);flex-shrink:0;width:60px;}
.overall-num{font-family:'Black Han Sans',sans-serif;font-size:38px;color:#D4A017;line-height:1;}
.overall-label{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:2px;color:rgba(212,160,23,0.5);text-transform:uppercase;}

.jersey-preview{border-bottom:1px solid rgba(255,255,255,0.07);padding:16px 20px;display:flex;align-items:center;justify-content:center;}
.jersey-wrap{position:relative;display:inline-block;}
.jersey-name-tag{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;letter-spacing:3px;color:#ffffff;text-transform:uppercase;white-space:nowrap;}
.jersey-num-tag{position:absolute;top:46px;left:50%;transform:translateX(-50%);font-family:'Black Han Sans',sans-serif;font-size:24px;color:#ffffff;line-height:1;}

.stats-grid{padding:16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.stat-item{display:flex;flex-direction:column;gap:5px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;}
.stat-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:14px;color:#D4A017;}
.stat-val.slow{color:rgba(212,160,23,0.4);}
.stat-bar-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;width:0%;transition:width 1.1s cubic-bezier(0.4,0,0.2,1);}
.stat-bar-fill.low{background:rgba(212,160,23,0.4);}
.stat-bar-fill.mid{background:rgba(212,160,23,0.7);}
.stat-bar-fill.high{background:#D4A017;}
.stat-bar-fill.max{background:#fff;}

.radar-section{padding:16px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.07);}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.2);text-transform:uppercase;align-self:flex-start;}

.bottom-section{padding:16px 16px;display:flex;flex-direction:column;gap:14px;}
.candle-row-wrap{display:flex;flex-direction:column;gap:10px;}
.candles-flex{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.candle{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:opacity 0.3s;touch-action:manipulation;min-width:26px;}
.candle.out{opacity:0.2;}
.c-flame{width:8px;height:13px;background:#D4A017;border-radius:50% 50% 40% 40%/55% 55% 45% 45%;animation:cf 0.35s ease-in-out infinite alternate;}
.candle.out .c-flame{background:#333;animation:none;height:3px;border-radius:1px;}
@keyframes cf{from{transform:scaleX(1);}to{transform:scaleX(0.82) scaleY(1.1);}}
.c-body{width:8px;height:32px;background:rgba(255,255,255,0.12);border-radius:2px;}
.c-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(255,255,255,0.2);font-weight:700;}
.candle-stat-text{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;color:rgba(212,160,23,0.6);text-transform:uppercase;line-height:1.5;}

.ball-kick-row{display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(212,160,23,0.2);padding:14px 16px;background:rgba(212,160,23,0.03);cursor:pointer;touch-action:manipulation;}
.ball-left{display:flex;align-items:center;gap:12px;pointer-events:none;}
.ball-mini{width:48px;height:48px;animation:spinB 5s linear infinite;flex-shrink:0;}
@keyframes spinB{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.ball-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;text-transform:uppercase;}
.ball-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.kick-count-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(212,160,23,0.5);text-transform:uppercase;pointer-events:none;}

.kick-flash{position:fixed;width:120px;height:120px;border-radius:50%;border:2px solid rgba(212,160,23,0.5);transform:scale(0);animation:flashOut 0.5s ease-out forwards;pointer-events:none;z-index:999;}
@keyframes flashOut{from{transform:scale(0);opacity:1;}to{transform:scale(4);opacity:0;}}

.footer-bar{margin-top:24px;display:flex;align-items:center;gap:10px;}
.footer-line{width:32px;height:1px;background:rgba(212,160,23,0.3);}
.footer-text{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.15);text-transform:uppercase;}
</style>

<div class="wrap">
<div class="bg-pattern"></div>
<div class="content">

  <div class="club-header">
    <svg class="club-crest" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <polygon points="26,2 48,14 48,38 26,50 4,38 4,14" fill="#1a1300" stroke="#D4A017" stroke-width="1.5"/>
      <polygon points="26,7 43,17 43,35 26,45 9,35 9,17" fill="none" stroke="rgba(212,160,23,0.3)" stroke-width="0.5"/>
      <text x="26" y="23" text-anchor="middle" font-family="'Black Han Sans',sans-serif" font-size="9" fill="#D4A017" letter-spacing="1">AL</text>
      <text x="26" y="34" text-anchor="middle" font-family="'Black Han Sans',sans-serif" font-size="10" fill="#fff" letter-spacing="0.5">NASSR</text>
      <line x1="14" y1="26" x2="38" y2="26" stroke="rgba(212,160,23,0.25)" stroke-width="0.5"/>
    </svg>
    <div>
      <div class="club-name">Al Nassr FC</div>
      <div class="club-league">Saudi Pro League · Riyadh</div>
    </div>
  </div>

  <div class="card-outer">
    <div class="card-top-stripe"></div>

    <div class="player-section">
      <div class="player-avatar">
        <svg width="96" height="130" viewBox="0 0 110 130" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="55" cy="128" rx="38" ry="6" fill="rgba(212,160,23,0.08)"/>
          <rect x="30" y="60" width="50" height="64" rx="6" fill="#1e1800"/>
          <rect x="30" y="60" width="50" height="10" fill="#D4A017" opacity="0.9"/>
          <rect x="38" y="70" width="34" height="3" fill="#1e1800"/>
          <circle cx="55" cy="42" r="22" fill="#2a2010"/>
          <circle cx="55" cy="42" r="20" fill="#3a2e18"/>
          <ellipse cx="55" cy="58" rx="14" ry="5" fill="#2a2010"/>
          <circle cx="47" cy="40" r="2.5" fill="#111"/>
          <circle cx="63" cy="40" r="2.5" fill="#111"/>
          <path d="M49 48 Q55 52 61 48" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <rect x="32" y="60" width="8" height="28" rx="3" fill="#2a2010"/>
          <rect x="70" y="60" width="8" height="28" rx="3" fill="#2a2010"/>
          <rect x="38" y="88" width="15" height="34" rx="3" fill="#1a1400"/>
          <rect x="57" y="88" width="15" height="34" rx="3" fill="#1a1400"/>
        </svg>
        <div class="avatar-shadow"></div>
      </div>

      <div class="player-info">
        <div class="player-number">NO. 41</div>
        <div class="player-name-first">Raihan Ibrahim</div>
        <div class="player-name-last">Okky</div>
        <div class="player-name-nick">"Baim"</div>
        <div class="player-meta">
          <div><div class="meta-label">Pos</div><div class="meta-value">ST</div></div>
          <div><div class="meta-label">Usia</div><div class="meta-value">8</div></div>
          <div><div class="meta-label">Negara</div><div class="meta-value">ID</div></div>
        </div>
      </div>

      <div class="overall-block">
        <div class="overall-num">84</div>
        <div class="overall-label">OVR</div>
      </div>

      <div class="jersey-bg">41</div>
    </div>

    <div class="jersey-preview">
      <div class="jersey-wrap">
        <svg width="140" height="96" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
          <polygon points="40,10 120,10 130,30 110,35 110,100 50,100 50,35 30,30" fill="#FEDC00"/>
          <polygon points="40,10 60,10 55,35 50,35" fill="#081C4E"/>
          <polygon points="120,10 100,10 105,35 110,35" fill="#081C4E"/>
          <rect x="50" y="10" width="60" height="8" fill="#081C4E" rx="2"/>
          <line x1="50" y1="35" x2="110" y2="35" stroke="#081C4E" stroke-width="1.5"/>
          <polygon points="30,30 50,35 50,65 20,55" fill="#FEDC00" stroke="#c49010" stroke-width="0.5"/>
          <polygon points="130,30 110,35 110,65 140,55" fill="#FEDC00" stroke="#c49010" stroke-width="0.5"/>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="radar-section">
      <div class="section-label">Radar kemampuan</div>

    <div class="bottom-section">
      <div class="candle-row-wrap">

        <div class="candle-stat-text" id="candleTxt">8 lilin menyala — tiup satu per satu!</div>

      <div class="ball-kick-row" id="kickRow" onclick="kickBall(event)">
        <div class="ball-left">
          <svg class="ball-mini" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="22" r="21" fill="#1a1300" stroke="rgba(212,160,23,0.5)" stroke-width="1"/>
            <polygon points="22,8 29,14 26,22 18,22 15,14" fill="#D4A017" opacity="0.9"/>
            <polygon points="29,14 36,13 38,20 32,25 26,22" fill="#111" stroke="rgba(212,160,23,0.3)" stroke-width="0.5"/>
            <polygon points="18,22 26,22 24,30 22,32 20,30" fill="#111" stroke="rgba(212,160,23,0.3)" stroke-width="0.5"/>
            <polygon points="15,14 18,22 10,24 6,19 8,12" fill="#111" stroke="rgba(212,160,23,0.3)" stroke-width="0.5"/>
          </svg>

</div>
</div>

<script>
const statsData = [
  { name: 'Tendangan', val: 86 },
  { name: 'Passing',   val: 83 },
  { name: 'Dribbling', val: 81 },
  { name: 'Fisik',     val: 80 },
  { name: 'Pertahanan',val: 78 },
  { name: 'Kecepatan', val: 55 },
];

const grid = document.getElementById('statsGrid');
statsData.forEach(s => {
  const cls = s.val >= 85 ? 'max' : s.val >= 78 ? 'high' : s.val >= 65 ? 'mid' : 'low';
  const vCls = s.val < 65 ? 'stat-val slow' : 'stat-val';
  const div = document.createElement('div');
  div.className = 'stat-item';
  div.innerHTML = `<div class="stat-row"><div class="stat-name">${s.name}</div><div class="${vCls}">${s.val}</div></div><div class="stat-bar-track"><div class="stat-bar-fill ${cls}" data-pct="${s.val}"></div></div>`;
  grid.appendChild(div);
});

setTimeout(() => {
  document.querySelectorAll('.stat-bar-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; });
}, 200);

function drawRadar() {
  const canvas = document.getElementById('radar');
  const dpr = window.devicePixelRatio || 1;
  const W = 240, H = 200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = W/2, cy = H/2 - 2, R = 72, n = statsData.length;
  ctx.clearRect(0, 0, W, H);
  for (let l = 1; l <= 4; l++) {
    const r = R * (l/4);
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const a = (Math.PI*2*i/n) - Math.PI/2;
      i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(212,160,23,0.12)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2*i/n) - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(212,160,23,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.beginPath();
  statsData.forEach((s,i) => {
    const a = (Math.PI*2*i/n)-Math.PI/2, r=R*(s.val/100);
    i===0 ? ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  });
  ctx.closePath();
  ctx.fillStyle='rgba(212,160,23,0.15)'; ctx.fill();
  ctx.strokeStyle='#D4A017'; ctx.lineWidth=1.5; ctx.stroke();
  statsData.forEach((s,i) => {
    const a=(Math.PI*2*i/n)-Math.PI/2, r=R*(s.val/100);
    ctx.beginPath(); ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),3,0,Math.PI*2);
    ctx.fillStyle = s.val<65 ? 'rgba(212,160,23,0.4)' : '#D4A017'; ctx.fill();
  });
  ctx.textAlign='center'; ctx.textBaseline='middle';
  statsData.forEach((s,i) => {
    const a=(Math.PI*2*i/n)-Math.PI/2, lr=R+20;
    ctx.font='600 10px Barlow Condensed, sans-serif';
    ctx.fillStyle = s.val<65 ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.5)';
    ctx.fillText(s.name, cx+lr*Math.cos(a), cy+lr*Math.sin(a));
  });
}
drawRadar();

let blownCount = 0;
const cGrid = document.getElementById('candleGrid');
for (let i = 0; i < 8; i++) {
  const c = document.createElement('div');
  c.className = 'candle';
  c.innerHTML = `<div class="c-flame"></div><div class="c-body"></div><div class="c-num">${i+1}</div>`;
  c.addEventListener('click', () => {
    if (!c.classList.contains('out')) {
      c.classList.add('out');
      blownCount++;
      const rem = 8 - blownCount;
      document.getElementById('candleTxt').textContent = rem > 0 ? `${rem} lilin tersisa` : 'Semua padam — Happy Birthday, Baim!';
    }
  });
  cGrid.appendChild(c);
}

let kicks = 0;
function kickBall(e) {
  kicks++;
  document.getElementById('kickCount').textContent = kicks + ' kick';
  const flash = document.createElement('div');
  flash.className = 'kick-flash';
  flash.style.left = (e.clientX - 60) + 'px';
  flash.style.top = (e.clientY - 60) + 'px';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 550);
}
</script>
